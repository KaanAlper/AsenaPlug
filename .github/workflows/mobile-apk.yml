name: Android — APK Release + AAB (private) + Play

# Her mobile/androidapp değişiminde İMZALI release APK + AAB üretir (upload key = secret):
#  - APK  -> GitHub RELEASE'e DİREKT dosya (AsenaPlug.apk, zip yok, herkes tek tık indirir)
#  - AAB  -> PRIVATE artifact (Play bundle; sadece repo erişimi olan indirir, public DEĞİL)
#  - AAB  -> PLAY_SERVICE_ACCOUNT_JSON secret'ı VARSA Play 'internal' track'e otomatik yüklenir
#            (yoksa adım sessizce atlanır -> Play hazır olunca secret ekle, aktifleşir).
# İmza secret'ları: ANDROID_KEYSTORE_BASE64 / _PASSWORD / KEY_ALIAS / KEY_PASSWORD.
# Aar repoda hazır (app/libs) -> gomobile/NDK GEREKMEZ, sadece gradle.
# Release 'android-v...' tag'i + "AsenaPlug Android" başlığı + PRERELEASE:
#   Windows updater /releases/latest'i kullanıyor; prerelease oraya GİRMEZ ->
#   Android release'leri Windows self-update'ini bozmaz, release listesi karışmaz.

on:
  push:
    paths:
      - 'mobile/androidapp/**'
      - '!mobile/androidapp/fastlane/**'   # Play listing metadata app'i etkilemez -> build tetikleme
      - '.github/workflows/mobile-apk.yml'
  workflow_dispatch:

permissions:
  contents: write          # release + tag oluşturmak için

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # secrets 'if:' içinde doğrudan okunamaz -> job env'e taşı, adımlar env.* ile kontrol eder
      PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    defaults:
      run:
        working-directory: mobile/androidapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: SDK bileşenleri (platform 35 + build-tools 35)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Keystore'u secret'tan çöz (release imzası)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_ENV"
            echo "release imzası AKTİF"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 yok -> release imzasız (Play yüklenemez)"
          fi

      - name: Build (İMZALI release APK + AAB)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: APK'yı temiz adlandır (AsenaPlug.apk)
        run: cp app/build/outputs/apk/release/app-release.apk AsenaPlug.apk

      - name: Android Release (SADECE APK — public, direkt indir)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v1.0.${{ github.run_number }}
          name: AsenaPlug Android v1.0.${{ github.run_number }}
          prerelease: true            # /releases/latest'e girmez -> Windows updater güvende
          make_latest: "false"
          files: mobile/androidapp/AsenaPlug.apk
          generate_release_notes: true

      - name: AAB — PRIVATE artifact (Play Store; sadece repo erişimi olan indirir)
        uses: actions/upload-artifact@v4
        with:
          name: asenaplug-aab-private
          path: mobile/androidapp/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Play Store'a yükle (kapalı beta track) — SADECE service account secret'ı varsa
        if: ${{ env.PLAY_SA_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.kaanalper.asenaplug
          releaseFiles: mobile/androidapp/app/build/outputs/bundle/release/*.aab
          track: beta          # kapalı beta (track adı farklıysa değiştir)
          status: completed
