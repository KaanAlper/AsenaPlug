name: Android — APK + AAB Release

# Her mobile/androidapp değişiminde APK + AAB üretir ve GitHub RELEASE'e DİREKT dosya
# (AsenaPlug.apk / AsenaPlug.aab) olarak yükler — artifact ZIP'i yok, tek tık indir.
# Aar repoda hazır (app/libs) -> gomobile/NDK GEREKMEZ, sadece gradle.
# Release 'android-v...' tag'i + "AsenaPlug Android" başlığı + PRERELEASE:
#   Windows updater /releases/latest'i kullanıyor; prerelease oraya GİRMEZ ->
#   Android release'leri Windows self-update'ini bozmaz, release listesi karışmaz.

on:
  push:
    paths:
      - 'mobile/androidapp/**'
      - '.github/workflows/mobile-apk.yml'
  workflow_dispatch:

permissions:
  contents: write          # release + tag oluşturmak için

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/androidapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: SDK bileşenleri (platform 35 + build-tools 35)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK + AAB (debug)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug bundleDebug --no-daemon --stacktrace

      - name: Çıktıları temiz adlandır (AsenaPlug.apk / AsenaPlug.aab)
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk AsenaPlug.apk
          cp app/build/outputs/bundle/debug/*.aab AsenaPlug.aab
          ls -lh AsenaPlug.apk AsenaPlug.aab

      - name: Android Release (APK + AAB direkt asset)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v1.0.${{ github.run_number }}
          name: AsenaPlug Android v1.0.${{ github.run_number }}
          prerelease: true            # /releases/latest'e girmez -> Windows updater güvende
          make_latest: "false"
          files: |
            mobile/androidapp/AsenaPlug.apk
            mobile/androidapp/AsenaPlug.aab
          generate_release_notes: true
